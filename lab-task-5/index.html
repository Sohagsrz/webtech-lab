<html>
<head>
    <title>Text Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
</head>
<body>
    <div class="header">
        <div class="headertxt">Lab Task 05: Text Analyzer</div>
    </div>

    <div class="mainbox">
        <div class="producttitle">Text Analysis Tool</div>

        <div class="row">
            <textarea id="textInput" class="textbox" placeholder="Paste your paragraph here..." rows="8"></textarea>
        </div>

        <div class="row">
            <button class="btn" onclick="analyzeText()">Analyze Text</button>
        </div>

        <div id="results" class="results-box" style="display: none;">
            <div class="result-item"><strong>Character Count:</strong> <span id="charCount">0</span></div>
            <div class="result-item"><strong>Word Count:</strong> <span id="wordCount">0</span></div>
            <div class="result-item"><strong>Reversed Text:</strong></div>
            <div class="reversed-text" id="reversedText"></div>
        </div>
    </div>

    <div class="footer">
        <div class="footertxt">Designed By Sohag Islam</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
